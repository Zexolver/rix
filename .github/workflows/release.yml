name: Release Rix Binary

on:
  push:
    tags:
      - "v*.*.*" # Triggers only when you push a tag like v0.4.3

jobs:
  build-and-release:
    name: Build and Upload Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to create the release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Rename binary for clarity (Optional)
        run: mv target/release/rix-cli target/release/rix-x86_64-linux

      - name: Create Release and Upload Binary
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: target/release/rix-x86_64-linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
